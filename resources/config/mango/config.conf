##### This file follows the docs ordering ####

# Required dependencies:
# - brightnessctl
# - playerctl
# - wireplumber (wpctl)

#### Configuration

### Basic configuration

## Autostart (configured in extraContent)

### Monitors

## Monitor Rules
monitorrule = name:eDP-1, scale:1, x:0, y:0, width:1920, height:1080, refresh:120, vrr:1

monitorrule = name:HDMI-A-1, scale:1, x:1920, y:0, width:1920, height:1080, refresh:80, vrr:1


### Input Devices

## Keyboard Settings
numlockon = 1
xkb_rules_layout = us
xkb_rules_variant = altgr-intl
xkb_rules_options = caps:escape

## Mouse Settings
accel_profile = 0


### Miscellaneous

## System & Hardware
xwayland_persistence = 0
allow_lock_transparent = 1

## Focus & Input
sloppyfocus = 0
warpcursor = 1
cursor_hide_timeout = 2

## Multi-Monitor & Tags
focus_cross_monitor = 1
exchange_cross_monitor = 1
circle_layout = scroller,tile


#### Visuals

### Theming

## Dimensions
borderpx=1

# Inner - between windows
gappih=20
gappiv=20

# Outer - between window and border of screen
gappoh=25
gappov=25


# Colors are in the following format: 0xRRGGBBAA

## Colors
# Highlight High
rootcolor=0x191724ff
# Rose
bordercolor=0xebbcbaff
# Love
focuscolor=0xeb6f92ff
# Iris
urgentcolor=0xc4a7e7ff

## State-specific colors
# Gold
maximizescreencolor=0xf6c177ff
# Overlay (I ran out of colors)
scratchpadcolor=0x26233aff
# Pine
globalcolor=0x31748fff
# Foam
overlaycolor=0x9ccfd8ff

## Cursor theme
cursor_size = 24
cursor_theme = Banana


### Status bar (ignored - I use Noctalia shell)
### Window effects

## Blur
blur = 1
blur_params_radius = 10
blur_params_saturation = 0.5

## Shadows
shadows = 1
shadow_only_floating = 1

## Opacity & Corner Radius
border_radius = 10
no_radius_when_single = 1
unfocused_opacity = 0.9

### Animations
animations = 1

animation_type_open = zoom
animation_type_close = fade

layer_animation_type_open = slide

#### Window Management
# I will only use Scroller and Tile

### Layouts

## Scroller Layout

scroller_default_proportion = 0.5
scroller_prefer_center = 1
edge_scroller_pointer_focus = 0
scroller_proportion_preset = 0.5,1.0
scroller_ignore_proportion_single = 0
scroller_default_proportion_single = 1.0


## Master-Stack Layouts (tile)

default_mfact = 0.5
smartgaps = 1

### Rules

## Tag Rules

# Default scroller
tagrule = monitor_name:eDP-1,layout_name:scroller
tagrule = monitor_name:HDMI-A-1,layout_name:scroller

# Except for tag 9 (Discord/Music) - To see both when switching
tagrule = id:9,layout_name:tile


### Overview

## Overview Settings
enable_hotarea = 0


#### Bindings & Input

### Key Bindings

## Present everywhere ----------------------------------------------------------
keymode = common

# Reload config
bind = SUPER+ALT,r,reload_config
# Exit
bind = SUPER+SHIFT+ALT,Escape,quit
# Switch to default mode
bind = SUPER+ALT,Escape,setkeymode,default

## -----------------------------------------------------------------------------

## Default mode ----------------------------------------------------------------
keymode = default

# App spawning gets set on the nix file

## Window management ##

bind = SUPER,w,killclient,

# Moving focus (Mod+hjkl)
bind = SUPER,h,focusdir,left
bind = SUPER,l,focusdir,right
bind = SUPER,k,focusdir,up
bind = SUPER,j,focusdir,down

# Moving windows (Mod+Shift+hjkl)
bind = SUPER+SHIFT,k,exchange_client,up
bind = SUPER+SHIFT,j,exchange_client,down
bind = SUPER+SHIFT,h,exchange_client,left
bind = SUPER+SHIFT,l,exchange_client,right

bind = SUPER,s,switch_proportion_preset,

bind = SUPER,n,switch_layout

# Window state toggles
bind = SUPER,backslash,togglefloating,
bind = SUPER,a,togglemaximizescreen,
bind = SUPER+SHIFT,f,togglefullscreen,

## Tag management ##

# Switch current tag
bind = SUPER,1,view,1,0
bind = SUPER,2,view,2,0
bind = SUPER,3,view,3,0
bind = SUPER,4,view,4,0
bind = SUPER,5,view,5,0
bind = SUPER,6,view,6,0
bind = SUPER,7,view,7,0
bind = SUPER,8,view,8,0
bind = SUPER,9,view,9,0

# Move window to tag
bind = SUPER+SHIFT,1,tag,1,0
bind = SUPER+SHIFT,2,tag,2,0
bind = SUPER+SHIFT,3,tag,3,0
bind = SUPER+SHIFT,4,tag,4,0
bind = SUPER+SHIFT,5,tag,5,0
bind = SUPER+SHIFT,6,tag,6,0
bind = SUPER+SHIFT,7,tag,7,0
bind = SUPER+SHIFT,8,tag,8,0
bind = SUPER+SHIFT,9,tag,9,0

# Focus monitor (Mod+Arrows)
bind = SUPER,Left,focusmon,left
bind = SUPER,Right,focusmon,right
bind = SUPER,Up,focusmon,up
bind = SUPER,Down,focusmon,down

# Move window to monitor (Mod+Shift+Arrows)
bind = SUPER+SHIFT,Left,tagmon,left
bind = SUPER+SHIFT,Right,tagmon,right

# Toggle Gaps
bind = SUPER,G,togglegaps

# Switch to resize mode
bind = SUPER+Shift,r,setkeymode,resize
## -----------------------------------------------------------------------------

## Resize mode ----------------------------------------------------------------
keymode = resize
bind = NONE,Down,resizewin,-10,0
bind = NONE,Up,setkeymode,+10,0

# Switch to default mode
bind = NONE,Escape,setkeymode,default
## -----------------------------------------------------------------------------

## Extra stuff -----------------------------------------------------------------
keymode = common

# Mouse buttons
mousebind = SUPER,btn_left,moveresize,curmove
mousebind = SUPER,btn_middle,togglemaximizescreen,0
mousebind = SUPER,btn_right,moveresize,curresize

# Gestures - move focus
gesturebind = NONE,left,3,viewtoleft_have_client,
gesturebind = NONE,right,3,viewtoright_have_client,
gesturebind = NONE,up,3,focusdir,left
gesturebind = NONE,down,3,focusdir,right

# Mouse buttons
gesturebind = NONE,left,4,focusmon,left
gesturebind = NONE,right,4,focusmon,right
gesturebind = NONE,up,4,focusmon,up
gesturebind = NONE,down,4,focusmon,down

## -----------------------------------------------------------------------------
